name: Test and publish
on:
  release:
    types: [created]
permissions:
  id-token: write
  contents: read
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: 
          node-version: 25
      - uses: oven-sh/setup-bun@v2
      - run: bun ci 
      - run: bun run trick-tsd && mkdir tmp && bun run build
      - run: bun run test
      - run: npm publish
